databases:
  - name: pm-db
    databaseName: mep_pm
    user: mep_pm_user
    plan: free

services:
  - type: web
    name: pm-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: pm-db
          property: connectionString
